spring.application.name=api
server.port=${PORT:8080}
app.storage.material-root=data/materials
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.r2.account-id=${APP_STORAGE_R2_ACCOUNT_ID:}
app.storage.r2.access-key=${APP_STORAGE_R2_ACCESS_KEY:}
app.storage.r2.secret-key=${APP_STORAGE_R2_SECRET_KEY:}
app.storage.r2.bucket=${APP_STORAGE_R2_BUCKET:}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.ai.base-url=${APP_AI_BASE_URL:http://localhost:8000}
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:change-me-super-secret-key-change-me-1234567890}
app.auth.jwt.expiration-ms=${APP_AUTH_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aistudy}
spring.datasource.username=${DB_USERNAME:aistudy}
spring.datasource.password=${DB_PASSWORD:aistudy}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
