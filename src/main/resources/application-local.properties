spring.datasource.url=jdbc:h2:mem:localqa;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.storage.type=local
app.storage.material-root=build/local-materials
app.ai.base-url=http://localhost:8000
app.school-api.base-url=https://open.neis.go.kr/hub
app.school-api.key=
app.school-api.endpoint=schoolInfo
app.school-api.page-size=1000
app.frontend.base-url=http://localhost:4173
app.cors.allowed-origins=http://localhost:4173
app.auth.jwt.secret=local-secret-key-for-human-testing-1234567890
app.auth.jwt.expiration-ms=86400000
