spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.storage.type=local
app.storage.material-root=build/test-materials
app.frontend.base-url=http://localhost:5173
app.ai.base-url=http://localhost:8000
app.school-api.base-url=https://open.neis.go.kr/hub
app.school-api.key=test-school-api-key
app.school-api.endpoint=schoolInfo
app.school-api.page-size=100
app.school-api.sync-enabled=false
app.auth.jwt.secret=test-secret-key-for-jwt-signing-1234567890
app.auth.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173
